services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agency_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - agency_os_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agency_os"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  agency_os_postgres_data:
